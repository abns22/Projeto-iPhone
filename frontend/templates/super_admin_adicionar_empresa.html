<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Admin - Adicionar Empresa</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style_admin.css') }}">
</head>
<body>
    <div class="admin-container">
        <header>
            <h1>Adicionar Nova Empresa Cliente</h1>
            <nav>
                <a href="{{ url_for('super_admin_dashboard') }}">Voltar para o Dashboard</a>
            </nav>
        </header>

        <main>
    <form method="POST" class="form-section">
        <h2>Dados da Nova Empresa</h2>
        <div class="form-group">
            <label for="nome_empresa">Nome da Empresa</label>
            <input type="text" id="nome_empresa" name="nome_empresa" required>
        </div>
        <div class="form-group">
            <label for="cnpj">CNPJ (opcional)</label>
            <input type="text" id="cnpj" name="cnpj">
        </div>

        <hr style="margin: 30px 0;">

        <h2>Dados do Usuário Administrador (Dono da Conta)</h2>
        <div class="form-group">
            <label for="nome_responsavel">Nome do Responsável</label>
            <input type="text" id="nome_responsavel" name="nome_responsavel" required>
        </div>
        <div class="form-group">
            <label for="email_admin">E-mail do Admin (será o login)</label>
            <input type="email" id="email_admin" name="email_admin" required>
        </div>
        <div class="form-group">
            <label for="senha_admin">Senha Inicial para o Admin</label>
            <input type="password" id="senha_admin" name="senha_admin" required>
        </div>
        
        <hr style="margin: 30px 0;">

        <h2>Plano e Permissões</h2>
        <div class="form-group">
            <label for="max_usuarios">Limite de Usuários</label>
            <input type="number" id="max_usuarios" name="max_usuarios" value="3" required>
        </div>
        <div class="form-group">
            <label><input type="checkbox" name="permite_ajuste_valores" value="true"> Pode ajustar valores de avaliação?</label>
        </div>
        <div class="form-group">
            <label><input type="checkbox" name="permite_link_convidado" value="true"> Pode gerar links para clientes?</label>
        </div>

        <div class="form-actions">
            <a href="{{ url_for('super_admin_dashboard') }}" class="btn-cancelar">Cancelar</a>
            <button type="submit" class="btn-adicionar">Salvar e Criar Empresa</button>
        </div>
    </form>
</main>
    </div>
</body>
</html>
