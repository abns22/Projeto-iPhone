<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de novo Usuário</title>
    <link rel="stylesheet" href="../static/styleCadastro.css">
</head>
<body>
    <div class="logo"><a href="{{ url_for('login') }}"><img src="../static/images-removebg-preview.png" height="200px" width="200px" alt="logo-oba"></div></a>
    
    <h1>Crie sua conta</h1>

    <form method="POST" action="{{ url_for('cadastro') }}">
        <div>
            <label for="usuario">Digite seu e-Mail</label><br>
            <input type="text" id="usuario" name="usuario" placeholder=" seuemail@provedor.com" required>
            </div>
        <br>
        <div>
            <label for="usuario">Digite sua senha</label><br>
            <input type="password" id="senha" name="senha" placeholder=" Sua senha" required>
            </div>
        <br>
        <div>
            <label for="usuario">Confirme sua senha</label><br>
            <input type="password" id="confirmar-senha" name="confirmar-senha" placeholder=" Confirme sua senha" required>
            </div>
        <br>
        <div>
            <label for="usuario">Seu telefone</label><br>
            <input type="text" id="telefone" name="telefone" placeholder=" DD+Numero" required>
            </div>
        <br>
        <div>
            <label for="usuario">Seu nome</label><br>
            <input type="text" id="nome-usuario" name="nome-usuario" placeholder=" Nome completo" required>
            </div>
        <br>
        <div>
            <button type="submit">Cadastrar</button>
        </div>
        {% if erro %}
        <p class="erro" style="color: red; font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;">{{ erro }}</p> {% endif %}
    </form>
    <br>
    <p>Ja tem um conta?&nbsp;<a href="{{ url_for ('login') }}"> Faça login aqui </a></p>
</body>
</html>
