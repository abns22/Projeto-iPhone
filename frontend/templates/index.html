<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="../static/style.css">
</head>
<body>
    <div class="logo"><img src="../static/images-removebg-preview.png" height="200px" width="200px" alt="logo-oba"></div>
    <div class="bem-vindo">
        <div class="login-div-h1"><h1 id="login-bem-vindo">Bem vindo</h1></div>
    </div>
    <div class="container">
        <form method="POST" action="/">
            <div class="input-email">
                <p class="p-email">E-mail</p>
                <input class="digite-email" type="text" name="usuario" placeholder="Seu e-mail">
            </div>
            <div class="input-senha">
                <p class="p-senha">Senha</p>
                <input class="digite-senha" type="password" name="senha" placeholder="Sua senha">
            </div>
            <div class="botao-entrar">
                <button class="entrar" type="submit">Entrar</button>
            </div>
        </form>
        <p class="adm">Para criar uma conta contate seu administrador!</p>
        <script src="../static/script.js"></script>
    </div>
</body>
</html>
